<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#111111" />
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#000000" />
  <meta name="description" content="Find your table at Zakareeyah and Sana's Walimah." />
  <title>Zakareeyah &amp; Sana — Walimah</title>

  <!-- favicons (relative paths for GitHub Pages) -->
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="manifest" href="site.webmanifest" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Playfair+Displa[...]

  <style>
    :root{
      --bg: linear-gradient(155deg, #0d0608 0%, #1a0f12 25%, #140a0e 50%, #1a0f12 75%, #0d0608 100%);
      --card: linear-gradient(135deg, rgba(32, 18, 22, 0.95), rgba(20, 10, 14, 0.95));
      --text: #F0E6D2;
      --text-dark: #0d0608;
      --muted: #E8D4B8;
      --accent: #a64d5a;
      --accent-light: #c45f6d;
      --accent-dark: #8b3d48;
      --secondary: #c9a393;
      --tertiary: #7d5d52;
      --title: #F0E6D2;
      --gold: #E8D4B8;
      --border: rgba(166, 77, 90, 0.25);
      --border-light: rgba(166, 77, 90, 0.12);
      --border-gold: rgba(240, 230, 210, 0.15);
      --shadow: rgba(0, 0, 0, 0.8);
      --shadow-light: rgba(166, 77, 90, 0.2);
      --font-serif: "Cormorant Garamond", "Playfair Display", Georgia, serif;
      --font-body: "Lora", Georgia, serif;
    }
    
    *{box-sizing:border-box}
    html,body{height:100%}
    
    body{
      margin:0;
      min-height:100%;
      background: var(--bg);
      background-attachment: fixed;
      color:var(--text);
      font-family:var(--font-body);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      padding:40px 28px;
    }
    
    /* Decorative elements */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(ellipse 800px 600px at 30% 40%, rgba(166, 77, 90, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse 600px 800px at 70% 60%, rgba(125, 93, 82, 0.04) 0%, transparent 50%),
        radial-gradient(ellipse 400px 400px at 50% 20%, rgba(240, 230, 210, 0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }
    
    main, header {
      position: relative;
      z-index: 1;
    }
    
    /* Unified container wrapper for cohesion */
    header {
      text-align: center;
      margin-bottom: 0;
      padding: 50px 30px 30px;
      position: relative;
      background: linear-gradient(180deg, rgba(240, 230, 210, 0.08) 0%, rgba(240, 230, 210, 0.04) 100%);
      border: 1px solid var(--border-gold);
      border-bottom: none;
      clip-path: polygon(0 0, 100% 0, 100% calc(100% - 20px), 0 100%);
    }
    
    header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--title), transparent);
      opacity: 0.6;
    }
    
    header::after {
      content: '✦';
      display: block;
      color: var(--title);
      font-size: 1rem;
      margin-bottom: 20px;
      letter-spacing: 4px;
      opacity: 0.8;
      font-weight: 300;
    }
    
    h1{ 
      margin: 0 0 8px 0;
      font-size: 2.6rem; 
      color: var(--title);
      font-family: var(--font-serif);
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: fadeInDown 1s ease-out;
      line-height: 1.3;
      text-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
    }
    
    .subtitle{ 
      margin: 0;
      color: var(--gold);
      font-size: 0.95rem;
      font-weight: 300;
      letter-spacing: 1.5px;
      animation: fadeInUp 1s ease-out 0.2s both;
      opacity: 0.9;
    }
    
    .card{
      background: var(--card);
      border: 1px solid var(--border);
      padding: 50px;
      border-top: none;
      box-shadow: 
        0 30px 80px rgba(0, 0, 0, 0.9),
        inset 0 1px 0 rgba(166, 77, 90, 0.15),
        inset 0 -1px 0 rgba(240, 230, 210, 0.08);
      max-width: 600px;
      margin: 0 auto;
      backdrop-filter: blur(10px);
      animation: fadeInScale 0.8s ease-out;
      position: relative;
      overflow: hidden;
      clip-path: polygon(0 20px, 0 100%, 100% 100%, 100% 0, calc(100% - 20px) 0);
    }
    
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.4;
    }
    
    .card::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0.3;
    }
    
    .label {
      display: block;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: var(--gold);
      margin-bottom: 24px;
      font-weight: 600;
      font-family: var(--font-serif);
      line-height: 1.8;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border-light);
    }
    
    input[type="text"], input[type="search"], textarea{
      width:100%;
      padding: 16px 20px;
      border-radius: 0;
      border: 1px solid var(--border);
      background: rgba(20, 10, 14, 0.5);
      color:var(--gold);
      outline:none;
      font-family: var(--font-body);
      font-size: 1rem;
      transition: all 0.3s ease;
      margin-bottom: 4px;
    }
    
    input[type="text"]:focus, 
    input[type="search"]:focus, 
    textarea:focus {
      border-color: var(--accent-light);
      background: rgba(20, 10, 14, 0.7);
      box-shadow: 0 0 20px var(--shadow-light), inset 0 0 10px rgba(166, 77, 90, 0.08);
    }
    
    input::placeholder, textarea::placeholder{ 
      color: rgba(232, 212, 184, 0.6);
    }
    
    button{
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
      color: var(--text-dark);
      border: 0;
      padding: 14px 32px;
      border-radius: 0;
      cursor:pointer;
      font-weight: 600;
      font-family: var(--font-serif);
      font-size: 1rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(166, 77, 90, 0.3), 0 0 0 1px rgba(240, 230, 210, 0.1);
      position: relative;
      overflow: hidden;
    }
    
    button::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 40px rgba(166, 77, 90, 0.45), 0 0 0 1px rgba(240, 230, 210, 0.15);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    button:hover::before {
      width: 300px;
      height: 300px;
    }
    
    .controls {
      margin-top: 24px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    
    .muted{ 
      color:var(--gold);
    }
    
    .small{ 
      font-size: 0.9rem; 
      color:var(--gold);
    }
    
    #result {
      flex: 1;
      min-height: 24px;
      display: flex;
      align-items: center;
    }
    
    .badge{
      display: inline-block;
      padding: 10px 18px;
      border-radius: 0;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
      color: var(--text-dark);
      font-weight: 700;
      font-family: var(--font-serif);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-size: 0.85rem;
      box-shadow: 0 6px 16px rgba(166, 77, 90, 0.4), 0 0 0 1px rgba(240, 230, 210, 0.1);
      animation: slideIn 0.4s ease-out;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
    }
    
    .result-text {
      animation: fadeInUp 0.4s ease-out;
      color: var(--gold);
    }
    
    .help-text {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border-light);
      font-size: 0.85rem;
      color: var(--gold);
      line-height: 1.7;
    }
    
    strong {
      color: var(--gold);
      font-weight: 600;
    }
    
    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes fadeInScale {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-10px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
    
    @media (max-width:720px){
      body{ 
        padding: 24px 16px;
      }
      h1 {
        font-size: 1.8rem;
      }
      header {
        padding: 40px 20px 20px;
      }
      .card{ 
        padding: 32px 24px;
      }
      .controls {
        flex-direction: column;
        align-items: stretch;
      }
      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Welcome to Zakareeyah &amp; Sana's Walimah</h1>
    <p class="subtitle">Find your seat for the Walimah</p>
  </header>

  <main class="card">
    <label class="label">Please search your name and find your table number</label>
    <input id="guest" type="text" placeholder="Enter your full name" autocomplete="name" />
    <div class="controls">
      <button id="submit">Find My Seat</button>
      <div id="result"></div>
    </div>
    <p class="help-text small">If you don't find your name, please find Aisha for assistance.</p>
  </main>

  <script>
    // Guest list - Update with your actual guest data
    const PRESET = [
      { name: 'Zakareeyah', seat: 'Table 1 (upper ground floor)' },
      { name: 'John Smith', seat: 'A1' },
      { name: 'Jane Smith', seat: 'A2' },
      { name: 'Alice Brown', seat: 'B1' },
      { name: 'Bob Johnson', seat: 'B2' },
      { name: 'Carol Davis', seat: 'C1' },
      { name: 'David Lee', seat: 'C2' }
    ];

    const guestEl = document.getElementById('guest');
    const submitBtn = document.getElementById('submit');
    const resultEl = document.getElementById('result');

    function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

    function findSeat(name){
      const q = name.trim().toLowerCase();
      if(!q) return null;
      return PRESET.find(p => p.name.toLowerCase() === q) || null;
    }

    submitBtn.addEventListener('click', ()=>{
      const name = guestEl.value.trim();
      if(!name){ 
        resultEl.innerHTML = '<span class="small result-text">Please enter your name</span>'; 
        return; 
      }
      const found = findSeat(name);
      if(found){
        resultEl.innerHTML = `<span class="result-text">Welcome <strong>${escapeHtml(found.name)}</strong> — your table is <span class="badge">${escapeHtml(found.seat)}</span></span>`;
      } else {
        resultEl.innerHTML = `<span class="small result-text">No seat found for <strong>${escapeHtml(name)}</strong>. Please find Aisha for assistance.</span>`;
      }
      guestEl.value = '';
    });

    guestEl.addEventListener('keypress', (e) => {
      if(e.key === 'Enter') submitBtn.click();
    });
  </script>
</body>
</html>
