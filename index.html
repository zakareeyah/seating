<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#111111" />
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#000000" />
  <meta name="description" content="Find your table at Zakareeyah and Sana's Walimah." />
  <title>Zakareeyah & Sana — Walimah</title>

  <!-- favicons -->
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="manifest" href="site.webmanifest" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg: linear-gradient(155deg, #0d0608 0%, #1a0f12 25%, #140a0e 50%, #1a0f12 75%, #0d0608 100%);
      --card: linear-gradient(135deg, rgba(32, 18, 22, 0.95), rgba(20, 10, 14, 0.95));
      --text: #f5e8e3;
      --text-dark: #0d0608;
      --muted: #d4b5aa;
      --accent: #a64d5a;
      --accent-light: #c45f6d;
      --accent-dark: #8b3d48;
      --secondary: #c9a393;
      --tertiary: #7d5d52;
      --title: #F0E6D2;
      --gold: #E8D4B8;
      --border: rgba(166, 77, 90, 0.25);
      --border-light: rgba(166, 77, 90, 0.12);
      --border-gold: rgba(240, 230, 210, 0.15);
      --shadow: rgba(0, 0, 0, 0.8);
      --shadow-light: rgba(166, 77, 90, 0.2);
      --font-serif: "Cormorant Garamond", "Playfair Display", Georgia, serif;
      --font-body: "Lora", Georgia, serif;
    }

    *{box-sizing:border-box}
    html,body{height:100%}

    body{
      margin:0;
      min-height:100%;
      background: var(--bg);
      background-attachment: fixed;
      color:var(--text);
      font-family:var(--font-body);
      padding:40px 28px;
    }

    body::before {
      content:'';
      position:fixed;
      inset:0;
      background:
        radial-gradient(ellipse 800px 600px at 30% 40%, rgba(166,77,90,0.06) 0%, transparent 50%),
        radial-gradient(ellipse 600px 800px at 70% 60%, rgba(125,93,82,0.04) 0%, transparent 50%),
        radial-gradient(ellipse 400px 400px at 50% 20%, rgba(240,230,210,0.03) 0%, transparent 50%);
      pointer-events:none;
      z-index:0;
    }

    main, header { position:relative; z-index:1; }

    header{
      text-align:center;
      padding:50px 30px 30px;
      background:linear-gradient(180deg, rgba(240,230,210,0.08), rgba(240,230,210,0.04));
      border:1px solid var(--border-gold);
      border-bottom:none;
      clip-path:polygon(0 0,100% 0,100% calc(100% - 20px),0 100%);
    }

    header::before{
      content:'';
      position:absolute;
      top:0;
      left:50%;
      transform:translateX(-50%);
      width:60px;
      height:2px;
      background:linear-gradient(90deg, transparent, var(--title), transparent);
      opacity:0.6;
    }

    header::after{
      content:'✦';
      display:block;
      color:var(--title);
      font-size:1rem;
      margin-bottom:20px;
      letter-spacing:4px;
      opacity:0.8;
    }

    h1{
      margin:0 0 8px 0;
      font-size:2.6rem;
      color:var(--title);
      font-family:var(--font-serif);
      letter-spacing:2px;
      text-transform:uppercase;
      text-shadow:0 4px 15px rgba(0,0,0,0.4);
    }

    .subtitle{
      margin:0;
      color:var(--gold);
      font-size:0.95rem;
      letter-spacing:1.5px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      padding:50px;
      max-width:600px;
      margin:0 auto;
      box-shadow:0 30px 80px rgba(0,0,0,0.9);
      position:relative;
      overflow:hidden;
    }

    .label{
      display:block;
      font-size:0.8rem;
      text-transform:uppercase;
      letter-spacing:2.5px;
      color:var(--gold);
      margin-bottom:24px;
      padding-bottom:16px;
      border-bottom:1px solid var(--border-light);
    }

    input[type="text"]{
      width:100%;
      padding:16px 20px;
      border:1px solid var(--border);
      background:rgba(20,10,14,0.5);
      color:var(--gold);
      font-size:1rem;
      margin-bottom:4px;
      position:relative;
    }

    input[type="text"]:focus{
      border-color:var(--accent-light);
      background:rgba(20,10,14,0.7);
    }

    /* ⭐ Suggestions dropdown */
    .suggestions{
      list-style:none;
      margin:0;
      padding:0;
      background:rgba(20,10,14,0.85);
      border:1px solid var(--border-light);
      max-height:200px;
      overflow-y:auto;
      position:absolute;
      width:100%;
      z-index:10;
      margin-top:6px; /* extra spacing under dropdown */
    }

    .suggestions li{
      padding:12px 16px;
      cursor:pointer;
      color:var(--gold);
      border-bottom:1px solid var(--border-light);
    }

    .suggestions li:hover{
      background:rgba(166,77,90,0.25);
    }

    /* ⭐ Mobile spacing */
    @media (max-width:720px){
      .suggestions li{
        padding:18px 20px;
        font-size:1rem;
      }
      .suggestions{
        max-height:260px;
        margin-top:10px;
      }
    }

    button{
      background:linear-gradient(135deg, var(--accent), var(--accent-light));
      color:var(--title);
      padding:14px 32px;
      border:0;
      cursor:pointer;
      font-family:var(--font-serif);
      letter-spacing:1.5px;
      text-transform:uppercase;
    }

    .badge{
      background:linear-gradient(135deg, var(--accent), var(--accent-light));
      color:var(--title);
      padding:10px 18px;
      font-family:var(--font-serif);
      text-transform:uppercase;
      letter-spacing:1.5px;
    }

    .result-text{ color:var(--gold); }

  </style>
</head>

<body>
  <header>
    <h1>Welcome to Zakareeyah & Sana's Walimah</h1>
    <p class="subtitle">Find your seat for the Walimah</p>
  </header>

  <main class="card">
    <label class="label">Please search your name and find your table number</label>

    <input id="guest" type="text" placeholder="Enter your full name" autocomplete="name" />
    <ul id="suggestions" class="suggestions"></ul>

    <div class="controls">
      <button id="submit">Find My Seat</button>
      <div id="result"></div>
    </div>

    <p class="help-text small">If you don't find your name, please find Aisha for assistance.</p>
  </main>

  <script>
    const PRESET = [
      { name: 'Zakareeyah', seat: 'Table 1 (upper ground floor)' },
      { name: 'John Smith', seat: 'A1' },
      { name: 'Jane Smith', seat: 'A2' },
      { name: 'Alice Brown', seat: 'B1' },
      { name: 'Bob Johnson', seat: 'B2' },
      { name: 'Carol Davis', seat: 'C1' },
      { name: 'David Lee', seat: 'C2' }
    ];

    const guestEl = document.getElementById('guest');
    const submitBtn = document.getElementById('submit');
    const resultEl = document.getElementById('result');
    const suggestionsEl = document.getElementById('suggestions');

    function escapeHtml(s){
      return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    /* ⭐ Levenshtein distance for typo tolerance */
    function levenshtein(a, b) {
      const matrix = Array.from({ length: a.length + 1 }, () => []);
      for (let i = 0; i <= a.length; i++) matrix[i][0] = i;
      for (let j = 0; j <= b.length; j++) matrix[0][j] = j;

      for (let i = 1; i <= a.length; i++) {
        for (let j = 1; j <= b.length; j++) {
          const cost = a[i - 1] === b[j - 1] ? 0 : 1;
          matrix[i][j] = Math.min(
            matrix[i - 1][j] + 1,
            matrix[i][j - 1] + 1,
            matrix[i - 1][j - 1] + cost
          );
        }
      }
      return matrix[a.length][b.length];
    }

    /* ⭐ Fuzzy suggestions */
    function showSuggestions(query){
      suggestionsEl.innerHTML = '';
      if(query.length < 3) return;

      const q = query.toLowerCase();

      const matches = PRESET.filter(p => {
        const name = p.name.toLowerCase();

        return (
          name.includes(q) ||
          name.startsWith(q) ||
          q.split(' ').every(word => name.includes(word)) ||
          levenshtein(name, q) <= 2
        );
      });

      matches.forEach(m => {
        const li = document.createElement('li');
        li.textContent = m.name;
        li.addEventListener('click', () => {
          guestEl.value = m.name;
          suggestionsEl.innerHTML = '';
        });
        suggestionsEl.appendChild(li);
      });
    }

    guestEl.addEventListener('input', () => {
      showSuggestions(guestEl.value.trim());
    });

    submitBtn.addEventListener('click', () => {
      const name = guestEl.value.trim();
      suggestionsEl.innerHTML = '';

      if(!name){
        resultEl.innerHTML = '<span class="result-text small">Please enter your name</span>';
        return;
      }

      const found = PRESET.find(p => p.name.toLowerCase() === name.toLowerCase());

      if(found){
        resultEl.innerHTML =
          `<span class="result-text">Welcome <strong>${escapeHtml(found.name)}</strong> — your table is <span class="badge">${escapeHtml(found.seat)}</span></span>`;
      } else {
        resultEl.innerHTML =
          `<span class="result-text small">No seat found for <strong>${escapeHtml(name)}</strong>. Please find Aisha for assistance.</span>`;
      }

      guestEl.value = '';
    });

    guestEl.addEventListener('keypress', (e) => {
      if(e.key === 'Enter') submitBtn.click();
    });
  </script>

</body>
</html>
