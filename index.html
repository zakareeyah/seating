<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#111111" />
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#000000" />
  <meta name="description" content="Find your table at Zakareeyah and Sana's Walimah." />
  <title>Zakareeyah &amp; Sana — Walimah</title>

  <!-- favicons (relative paths for GitHub Pages) -->
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="manifest" href="site.webmanifest" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root{
      --bg: linear-gradient(135deg, #0a0e27 0%, #1a1a2e 50%, #0f0f1e 100%);
      --card: linear-gradient(135deg, rgba(26, 26, 46, 0.8), rgba(15, 15, 30, 0.8));
      --text: #f5f1e8;
      --text-dark: #0a0e27;
      --muted: #c9b8a8;
      --accent: #d4af37;
      --accent-light: #e8c547;
      --secondary: #8b7355;
      --border: rgba(212, 175, 55, 0.2);
      --border-light: rgba(212, 175, 55, 0.1);
      --shadow: rgba(0, 0, 0, 0.8);
      --shadow-light: rgba(212, 175, 55, 0.15);
      --font-serif: "Cormorant Garamond", "Playfair Display", Georgia, serif;
      --font-body: "Lora", Georgia, serif;
    }
    
    *{box-sizing:border-box}
    html,body{height:100%}
    
    body{
      margin:0;
      min-height:100%;
      background: var(--bg);
      background-attachment: fixed;
      color:var(--text);
      font-family:var(--font-body);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      padding:40px 28px;
    }
    
    /* Decorative elements */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(circle at 20% 50%, rgba(212, 175, 55, 0.05) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(139, 115, 85, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }
    
    main, header {
      position: relative;
      z-index: 1;
    }
    
    header{ 
      text-align:center; 
      margin-bottom:48px;
      padding: 40px 0;
      border-bottom: 2px solid var(--border);
      position: relative;
    }
    
    header::before,
    header::after {
      content: '✦';
      display: block;
      color: var(--accent);
      font-size: 1.2rem;
      margin: 12px 0;
      letter-spacing: 8px;
    }
    
    h1{ 
      margin:0; 
      font-size:3.2rem; 
      color:var(--accent);
      font-family: var(--font-serif);
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: fadeInDown 1s ease-out;
    }
    
    .subtitle{ 
      margin-top:12px; 
      color:var(--muted);
      font-size: 1.1rem;
      font-weight: 300;
      letter-spacing: 1px;
      animation: fadeInUp 1s ease-out 0.2s both;
    }
    
    .card{
      background: var(--card);
      border: 1px solid var(--border);
      padding: 48px;
      border-radius: 2px;
      box-shadow: 
        0 20px 60px var(--shadow),
        inset 0 1px 0 rgba(212, 175, 55, 0.1);
      max-width: 600px;
      margin: 0 auto;
      backdrop-filter: blur(10px);
      animation: fadeInScale 0.8s ease-out;
      position: relative;
      overflow: hidden;
    }
    
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.5;
    }
    
    .label {
      display: block;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent);
      margin-bottom: 16px;
      font-weight: 600;
      font-family: var(--font-serif);
    }
    
    input[type="text"], input[type="search"], textarea{
      width:100%;
      padding: 16px 20px;
      border-radius: 0;
      border: 1px solid var(--border);
      background: rgba(15, 15, 30, 0.4);
      color:var(--text);
      outline:none;
      font-family: var(--font-body);
      font-size: 1rem;
      transition: all 0.3s ease;
    }
    
    input[type="text"]:focus, 
    input[type="search"]:focus, 
    textarea:focus {
      border-color: var(--accent);
      background: rgba(15, 15, 30, 0.6);
      box-shadow: 0 0 20px var(--shadow-light), inset 0 0 10px rgba(212, 175, 55, 0.05);
    }
    
    input::placeholder, textarea::placeholder{ 
      color: rgba(197, 184, 168, 0.6);
    }
    
    button{
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
      color: var(--text-dark);
      border: 0;
      padding: 14px 32px;
      border-radius: 0;
      cursor:pointer;
      font-weight: 600;
      font-family: var(--font-serif);
      font-size: 1rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.3s ease;
      box-shadow: 0 8px 24px rgba(212, 175, 55, 0.2);
      position: relative;
      overflow: hidden;
    }
    
    button::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(212, 175, 55, 0.35);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    button:hover::before {
      width: 300px;
      height: 300px;
    }
    
    .controls {
      margin-top: 20px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    
    .muted{ 
      color:var(--muted);
    }
    
    .small{ 
      font-size: 0.9rem; 
      color:var(--muted);
    }
    
    #result {
      flex: 1;
      min-height: 24px;
      display: flex;
      align-items: center;
    }
    
    .badge{
      display: inline-block;
      padding: 8px 16px;
      border-radius: 0;
      background: var(--accent);
      color: var(--text-dark);
      font-weight: 700;
      font-family: var(--font-serif);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.9rem;
      box-shadow: 0 4px 12px rgba(212, 175, 55, 0.3);
      animation: slideIn 0.4s ease-out;
    }
    
    .result-text {
      animation: fadeInUp 0.4s ease-out;
    }
    
    .help-text {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.6;
    }
    
    strong {
      color: var(--accent-light);
    }
    
    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes fadeInScale {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-10px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
    
    @media (max-width:720px){
      body{ 
        padding: 24px 16px;
      }
      h1 {
        font-size: 2rem;
      }
      .card{ 
        padding: 32px 24px;
        border-radius: 0;
      }
      .controls {
        flex-direction: column;
        align-items: stretch;
      }
      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Zakareeyah &amp; Sana</h1>
    <p class="subtitle">Find your seat for the Walimah</p>
  </header>

  <main class="card">
    <label class="label">Guest Lookup</label>
    <input id="guest" type="text" placeholder="Enter your full name" autocomplete="name" />
    <div class="controls">
      <button id="submit">Find My Seat</button>
      <div id="result"></div>
    </div>
    <p class="help-text small">Enter your name to discover your seating arrangement. If you don't find your name, please contact us for assistance.</p>
  </main>

  <script>
    // Guest list - Update with your actual guest data
    const PRESET = [
      { name: 'John Smith', seat: 'A1' },
      { name: 'Jane Smith', seat: 'A2' },
      { name: 'Alice Brown', seat: 'B1' },
      { name: 'Bob Johnson', seat: 'B2' },
      { name: 'Carol Davis', seat: 'C1' },
      { name: 'David Lee', seat: 'C2' }
    ];

    const guestEl = document.getElementById('guest');
    const submitBtn = document.getElementById('submit');
    const resultEl = document.getElementById('result');

    function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

    function findSeat(name){
      const q = name.trim().toLowerCase();
      if(!q) return null;
      return PRESET.find(p => p.name.toLowerCase() === q) || null;
    }

    submitBtn.addEventListener('click', ()=>{
      const name = guestEl.value.trim();
      if(!name){ 
        resultEl.innerHTML = '<span class="small result-text">Please enter your name</span>'; 
        return; 
      }
      const found = findSeat(name);
      if(found){
        resultEl.innerHTML = `<span class="result-text">Welcome <strong>${escapeHtml(found.name)}</strong> — your seat is <span class="badge">${escapeHtml(found.seat)}</span></span>`;
      } else {
        resultEl.innerHTML = `<span class="small result-text">No seat found for <strong>${escapeHtml(name)}</strong>. Check the spelling or contact us.</span>`;
      }
      guestEl.value = '';
    });

    guestEl.addEventListener('keypress', (e) => {
      if(e.key === 'Enter') submitBtn.click();
    });
  </script>
</body>
</html>
