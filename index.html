<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#111111" />
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#000000" />
  <meta name="description" content="Find your table at Zakareeyah and Sana's Walimah." />
<title>Find your seat at Zakareeyah and Sana's Walimah</title>
  
  <!-- Removed all favicon + apple-touch-icon + manifest lines -->

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Lora:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg: linear-gradient(155deg, #150608 0%, #2a0f12 25%, #1c0a0e 50%, #2a0f12 75%, #150608 100%);
      --card: linear-gradient(135deg, rgba(40, 18, 22, 0.95), rgba(25, 10, 14, 0.95));
      --title: #F0E6D2;
      --accent: #a64d5a;
      --accent-light: #c45f6d;
      --border-light: rgba(166, 77, 90, 0.12);
      --font-serif: "Cormorant Garamond", serif;
      --font-body: "Lora", serif;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      background:var(--bg);
      color:var(--title);
      font-family:var(--font-body);
      padding:40px 20px;
    }

    header{
      text-align:center;
      padding:40px 20px 24px;
      background:rgba(240,230,210,0.05);
      border:1px solid rgba(240,230,210,0.15);
      border-bottom:none;
    }

    h1{
      margin:0;
      font-size:2.2rem;
      color:var(--title);
      font-family:var(--font-serif);
      text-transform:uppercase;
    }

    .subtitle{
      margin:8px 0 0 0;
      color:var(--title);
      font-size:1rem;
      font-family:var(--font-serif);
    }

    .card{
      background:var(--card);
      border:1px solid rgba(166,77,90,0.25);
      padding:32px 24px 40px;
      max-width:600px;
      margin:24px auto 0 auto;
      color:var(--title);
      display:flex;
      flex-direction:column;
      align-items:center;
    }

    .input-wrapper{
      width:100%;
      max-width:420px;
      display:flex;
      flex-direction:column;
      align-items:center;
    }

    .label{
      display:block;
      font-size:0.9rem;
      letter-spacing:1px;
      color:var(--title);
      margin:0 0 20px 0;
      padding-bottom:12px;
      border-bottom:1px solid var(--border-light);
      text-transform:none;
      width:100%;
      text-align:center;
      font-family:var(--font-serif);
    }

    input[type="text"]{
      width:100%;
      padding:12px 16px;
      border:1px solid rgba(166,77,90,0.25);
      background:rgba(20,10,14,0.5);
      color:var(--title);
      font-size:0.9rem;
      font-style:italic;
      font-family:var(--font-serif);
    }

    input[type="text"]::placeholder{
      color:rgba(240,230,210,0.7);
      font-style:italic;
      font-size:0.9rem;
    }

    input[type="text"]:focus{
      border-color:var(--accent-light);
      background:rgba(20,10,14,0.7);
      outline:none;
    }

    .suggestions{
      list-style:none;
      margin:10px 0 0 0;
      padding:0;
      background:rgba(20,10,14,0.85);
      border:1px solid var(--border-light);
      max-height:220px;
      overflow-y:auto;
      width:100%;
      color:var(--title);
    }

    .suggestions li{
      padding:12px 16px;
      cursor:pointer;
      color:var(--title);
      border-bottom:1px solid var(--border-light);
      font-family:var(--font-serif);
    }

    .suggestions li:hover{
      background:rgba(166,77,90,0.25);
    }

    .result-text{
      margin-top:20px;
      display:block;
      color:var(--title);
      font-size:1.05rem;
      font-family:var(--font-serif);
      text-align:center;
    }

    .help-text{
      margin-top:24px;
      font-size:0.75rem;
      font-style:italic;
      text-align:center;
      font-family:var(--font-serif);
    }

    @media (max-width:480px){
      h1{ font-size:1.8rem; }
      .card{ padding:24px 18px 32px; }
    }
  </style>
</head>

<body>
  <header>
    <h1>Welcome to Zakareeyah & Sana's Walimah</h1>
    <p class="subtitle">Let's help you get seated.</p>
  </header>

  <main class="card">

    <div class="input-wrapper">
      <label class="label">Enter your name below to find your table number</label>

      <input id="guest" type="text" placeholder="Enter your name…" autocomplete="name" />
      <ul id="suggestions" class="suggestions"></ul>
    </div>

    <div id="result"></div>

    <p class="help-text small">*If you're unable to find your name, please locate Zinneerah or Zumzum for assistance, thank you.*</p>
  </main>

  <script>
    const PRESET = [
      { name: 'Zakareeyah M.', seat: 'Table 1 (upper ground floor)' },
      { name: 'John Smith', seat: 'A1' },
      { name: 'Jane Smith', seat: 'A2' },
      { name: 'Alice Brown', seat: 'B1' },
      { name: 'Bob Johnson', seat: 'B2' },
      { name: 'Carol Davis', seat: 'C1' },
      { name: 'David Lee', seat: 'C2' }
    ];

    const guestEl = document.getElementById('guest');
    const resultEl = document.getElementById('result');
    const suggestionsEl = document.getElementById('suggestions');

    function escapeHtml(s){
      return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function levenshtein(a, b) {
      const matrix = Array.from({ length: a.length + 1 }, () => []);
      for (let i = 0; i <= a.length; i++) matrix[i][0] = i;
      for (let j = 0; j <= b.length; j++) matrix[0][j] = j;

      for (let i = 1; i <= a.length; i++) {
        for (let j = 1; j <= b.length; j++) {
          const cost = a[i - 1] === b[j - 1] ? 0 : 1;
          matrix[i][j] = Math.min(
            matrix[i - 1][j] + 1,
            matrix[i][j - 1] + 1,
            matrix[i - 1][j - 1] + cost
          );
        }
      }
      return matrix[a.length][b.length];
    }

    function updateResults(query){
      resultEl.innerHTML = '';
      suggestionsEl.innerHTML = '';

      if(query.length < 3) return;

      const q = query.toLowerCase();

      const matches = PRESET.filter(p => {
        const name = p.name.toLowerCase();
        return (
          name.includes(q) ||
          name.startsWith(q) ||
          q.split(' ').every(word => name.includes(word)) ||
          levenshtein(name, q) <= 2
        );
      });

      if(matches.length === 1){
        const m = matches[0];
        const duplicates = PRESET.filter(p => p.name.toLowerCase() === m.name.toLowerCase());

        if(duplicates.length === 1){
          suggestionsEl.innerHTML = '';
          resultEl.innerHTML =
            `<span class="result-text">Welcome <strong>${escapeHtml(m.name)}</strong> — you're on ${escapeHtml(m.seat.toUpperCase())}</span>`;
          return;
        }
      }

      matches.forEach(m => {
        const li = document.createElement('li');
        li.innerHTML = `${escapeHtml(m.name)} — ${escapeHtml(m.seat)}`;
        li.addEventListener('click', () => {
          guestEl.value = m.name;
          suggestionsEl.innerHTML = '';
          resultEl.innerHTML =
            `<span class="result-text">Welcome <strong>${escapeHtml(m.name)}</strong> — you're on ${escapeHtml(m.seat.toUpperCase())}</span>`;
        });
        suggestionsEl.appendChild(li);
      });
    }

    guestEl.addEventListener('input', () => {
      updateResults(guestEl.value.trim());
    });
  </script>

</body>
</html>
